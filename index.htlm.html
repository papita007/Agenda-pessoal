<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>minha agenda</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#fafaf9;
  --text:#1c1917;--text2:#78716c;--text3:#a8a29e;
  --border:#e7e5e4;--border2:#d6d3d1;
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#3C3489;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1917;--bg2:#292524;--bg3:#0c0a09;
  --text:#fafaf9;--text2:#a8a29e;--text3:#57534e;
  --border:#292524;--border2:#44403c;
  --purple-light:#26215C;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem}
.app{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);width:100%;max-width:900px;min-height:600px;display:flex;flex-direction:column;overflow:hidden}

/* header */
.header{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;border-bottom:0.5px solid var(--border);gap:.75rem;flex-wrap:wrap}
.header h1{font-size:17px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px}
.header h1 i{color:var(--purple);font-size:20px}
.tabs{display:flex;gap:3px;background:var(--bg2);border-radius:var(--radius);padding:3px}
.tab{padding:5px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .15s}
.tab.active{background:var(--bg);color:var(--text);border:0.5px solid var(--border)}
.add-btn{display:flex;align-items:center;gap:6px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius);padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.add-btn:hover{background:var(--purple-dark)}

/* notif */
.notif-banner{display:none;align-items:center;gap:10px;padding:.75rem 1.25rem;background:#FAEEDA;border-bottom:0.5px solid #FAC775;font-size:13px;color:#412402}
.notif-banner.show{display:flex}
.notif-banner i{font-size:18px;color:#BA7517;flex-shrink:0}
.notif-close{margin-left:auto;background:none;border:none;cursor:pointer;color:#633806;font-size:18px;padding:0;line-height:1}

/* layout */
.main{display:grid;grid-template-columns:1fr 275px;flex:1;min-height:0}
@media(max-width:640px){.main{grid-template-columns:1fr}}

/* calendar */
.calendar-area{padding:1rem 1.25rem;border-right:0.5px solid var(--border)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem}
.cal-nav button{background:none;border:0.5px solid var(--border);border-radius:var(--radius);padding:5px 12px;cursor:pointer;color:var(--text2);font-size:14px;transition:background .15s}
.cal-nav button:hover{background:var(--bg2)}
.cal-nav-center{display:flex;align-items:center;gap:2px}
.nav-select{background:var(--bg);border:0.5px solid var(--border);font-size:14px;font-weight:500;color:var(--text);cursor:pointer;padding:5px 8px;border-radius:var(--radius);font-family:inherit;transition:all .15s}
.nav-select:hover{border-color:var(--border2);background:var(--bg2)}
.nav-select:focus{outline:none;border-color:var(--purple)}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.weekdays span{text-align:center;font-size:10px;color:var(--text3);font-weight:600;padding:4px 0;text-transform:uppercase;letter-spacing:.04em}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.day-cell{min-height:68px;border-radius:6px;padding:4px;border:0.5px solid transparent;cursor:pointer;transition:all .15s;background:var(--bg)}
.day-cell:hover{border-color:var(--border2);background:var(--bg2)}
.day-cell.today{border-color:var(--purple);background:var(--purple-light)}
.day-cell.other-month .day-num{color:var(--text3)}
.day-num{font-size:11px;font-weight:500;color:var(--text);margin-bottom:2px}
.day-cell.today .day-num{color:var(--purple-dark);font-weight:700}
.event-dot{font-size:10px;line-height:1.35;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;cursor:pointer}
.ev-purple{background:#EEEDFE;color:#3C3489}
.ev-teal{background:#E1F5EE;color:#085041}
.ev-coral{background:#FAECE7;color:#712B13}
.ev-amber{background:#FAEEDA;color:#633806}
.ev-blue{background:#E6F1FB;color:#0C447C}

/* sidebar */
.sidebar{display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:.875rem 1.25rem;border-bottom:0.5px solid var(--border)}
.sidebar-section h3{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.625rem;display:flex;align-items:center;gap:5px}
.upload-area{border:1px dashed var(--border2);border-radius:var(--radius);padding:.875rem;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.upload-area:hover{border-color:var(--purple);background:var(--purple-light)}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-area p{font-size:11px;color:var(--text3);margin-top:3px}
.upload-area i{font-size:20px;color:var(--text3)}
.upload-area:hover i{color:var(--purple)}
.upload-label{font-size:13px;font-weight:500;color:var(--text);margin-top:3px}
.ai-result{margin-top:.5rem;background:var(--bg2);border-radius:var(--radius);padding:.625rem .75rem;font-size:12px;color:var(--text2);display:none;line-height:1.5}
.ai-result.show{display:block}
.ai-loading{display:none;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin-top:.5rem}
.ai-loading.show{display:flex}
.spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* upcoming */
.upcoming{display:flex;flex-direction:column;gap:5px;flex:1;overflow-y:auto;padding:.875rem 1.25rem}
.event-item{display:flex;gap:9px;align-items:flex-start;padding:.5rem .625rem;border-radius:var(--radius);border:0.5px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg)}
.event-item:hover{border-color:var(--border2);background:var(--bg2)}
.event-item.near{border-left:3px solid #D85A30}
.ev-badge{min-width:30px;text-align:center;background:var(--bg2);border-radius:6px;padding:3px 2px}
.ev-badge .mo{font-size:9px;text-transform:uppercase;color:var(--text3);font-weight:600}
.ev-badge .nu{font-size:15px;font-weight:500;color:var(--text)}
.ev-info{flex:1;min-width:0}
.ev-info .title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-info .meta{font-size:11px;color:var(--text2)}
.bell-badge{font-size:10px;background:#FAECE7;color:#712B13;padding:1px 5px;border-radius:3px;white-space:nowrap;font-weight:500}
.empty{font-size:12px;color:var(--text3);text-align:center;padding:1rem 0}

/* list view */
.list-view{display:none;padding:1rem 1.25rem;flex-direction:column;gap:6px;overflow-y:auto;max-height:520px}
.list-view.show{display:flex}
.lev{display:flex;gap:12px;align-items:flex-start;padding:.75rem 1rem;border-radius:var(--radius);border:0.5px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg)}
.lev:hover{border-color:var(--border2);background:var(--bg2)}
.lev.near{border-left:3px solid #D85A30}
.lev-bar{width:4px;border-radius:2px;align-self:stretch;flex-shrink:0}
.lev-info .title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px}
.lev-info .meta{font-size:12px;color:var(--text2);display:flex;gap:10px;flex-wrap:wrap}
.mi{display:flex;align-items:center;gap:3px}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);width:360px;max-width:95vw;padding:1.25rem;display:flex;flex-direction:column;gap:.75rem;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:500;color:var(--text)}
.modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:3px}
.modal input,.modal select,.modal textarea{width:100%;font-size:13px;border-radius:var(--radius);border:0.5px solid var(--border2);padding:7px 10px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;font-family:inherit}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--purple)}
.modal textarea{resize:vertical;min-height:56px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}

/* color picker */
.color-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.color-opt{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 10px;border-radius:var(--radius);border:0.5px solid transparent;transition:all .15s}
.color-opt:hover{background:var(--bg2);border-color:var(--border)}
.color-opt.active{border-color:var(--purple);background:var(--purple-light)}
.color-swatch{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.color-label{font-size:12px;color:var(--text2)}

/* modal footer */
.modal-footer{display:flex;gap:.5rem;justify-content:flex-end;padding-top:.5rem;border-top:0.5px solid var(--border);margin-top:.25rem}
.btn-primary{background:var(--purple);color:#fff;border:none;border-radius:var(--radius);padding:7px 18px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:var(--purple-dark)}
.btn-ghost{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:7px 16px;font-size:13px;cursor:pointer;color:var(--text2);transition:background .15s}
.btn-ghost:hover{background:var(--bg2)}
.btn-danger{background:#FAECE7;color:#712B13;border:none;border-radius:var(--radius);padding:7px 12px;font-size:13px;cursor:pointer;margin-right:auto;transition:background .15s}
.btn-danger:hover{background:#F5C4B3}
</style>
</head>
<body>

<div class="app">

  <!-- notificação -->
  <div class="notif-banner" id="notifBanner">
    <i class="ti ti-bell-ringing"></i>
    <span id="notifMsg"></span>
    <button class="notif-close" onclick="document.getElementById('notifBanner').classList.remove('show')">
      <i class="ti ti-x"></i>
    </button>
  </div>

  <!-- cabeçalho -->
  <div class="header">
    <h1><i class="ti ti-calendar-event"></i> minha agenda</h1>
    <div class="tabs">
      <button class="tab active" onclick="switchView('calendar')">calendário</button>
      <button class="tab" onclick="switchView('list')">lista</button>
    </div>
    <button class="add-btn" onclick="openNewEvent(null)">
      <i class="ti ti-plus"></i> evento
    </button>
  </div>

  <!-- lista view -->
  <div id="listView" class="list-view"></div>

  <!-- grid principal -->
  <div class="main" id="mainGrid">

    <!-- calendário -->
    <div class="calendar-area">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
        <div class="cal-nav-center">
          <select class="nav-select" id="monthSelect" onchange="jumpToMonth()"></select>
          <select class="nav-select" id="yearSelect" onchange="jumpToMonth()"></select>
        </div>
        <button onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="weekdays">
        <span>dom</span><span>seg</span><span>ter</span><span>qua</span><span>qui</span><span>sex</span><span>sáb</span>
      </div>
      <div class="days-grid" id="daysGrid"></div>
    </div>

    <!-- sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <h3><i class="ti ti-sparkles"></i> enviar mídia</h3>
        <div class="upload-area">
          <input type="file" accept="image/*,.pdf,.txt" onchange="handleUpload(event)" multiple>
          <i class="ti ti-cloud-upload"></i>
          <div class="upload-label">arraste ou clique</div>
          <p>fotos, prints, docs — IA extrai datas</p>
        </div>
        <div class="ai-loading" id="aiLoading">
          <div class="spinner"></div>
          <span>analisando com IA...</span>
        </div>
        <div class="ai-result" id="aiResult"></div>
      </div>

      <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
        <h3><i class="ti ti-clock-hour-4"></i> próximos eventos</h3>
        <div class="upcoming" id="upcomingList"></div>
      </div>
    </div>

  </div>
</div>

<!-- modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">novo evento</h2>

    <div>
      <label>título</label>
      <input type="text" id="evTitle" placeholder="nome do evento">
    </div>

    <div class="row2">
      <div>
        <label>data</label>
        <input type="date" id="evDate">
      </div>
      <div>
        <label>horário</label>
        <input type="time" id="evTime">
      </div>
    </div>

    <div>
      <label>local</label>
      <input type="text" id="evLocal" placeholder="endereço ou link">
    </div>

    <div>
      <label>pessoas</label>
      <input type="text" id="evPeople" placeholder="nomes separados por vírgula">
    </div>

    <div>
      <label>nota</label>
      <textarea id="evNote" placeholder="detalhes adicionais..."></textarea>
    </div>

    <div>
      <label>lembrete</label>
      <select id="evReminder">
        <option value="0">sem lembrete</option>
        <option value="10">10 minutos antes</option>
        <option value="30">30 minutos antes</option>
        <option value="60">1 hora antes</option>
        <option value="1440">1 dia antes</option>
        <option value="2880">2 dias antes</option>
      </select>
    </div>

    <div>
      <label>categoria / cor</label>
      <div class="color-grid" id="colorGrid">
        <div class="color-opt active" data-color="purple" onclick="setColor(this)">
          <div class="color-swatch" style="background:#7F77DD"></div>
          <span class="color-label">pessoal</span>
        </div>
        <div class="color-opt" data-color="teal" onclick="setColor(this)">
          <div class="color-swatch" style="background:#1D9E75"></div>
          <span class="color-label">saúde</span>
        </div>
        <div class="color-opt" data-color="coral" onclick="setColor(this)">
          <div class="color-swatch" style="background:#D85A30"></div>
          <span class="color-label">social</span>
        </div>
        <div class="color-opt" data-color="amber" onclick="setColor(this)">
          <div class="color-swatch" style="background:#BA7517"></div>
          <span class="color-label">trabalho</span>
        </div>
        <div class="color-opt" data-color="blue" onclick="setColor(this)">
          <div class="color-swatch" style="background:#378ADD"></div>
          <span class="color-label">estudo</span>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-danger" id="btnDelete" onclick="deleteEvent()" style="display:none">
        <i class="ti ti-trash"></i> apagar
      </button>
      <button class="btn-ghost" onclick="closeModal()">cancelar</button>
      <button class="btn-primary" onclick="saveEvent()">salvar</button>
    </div>
  </div>
</div>

<script>
const MONTHS     = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const MONTHS_S   = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const STORAGE_KEY = 'agenda_v2';
const COLOR_HEX  = {purple:'#7F77DD',teal:'#1D9E75',coral:'#D85A30',amber:'#BA7517',blue:'#378ADD'};

/* ── state ── */
let curMonth = new Date().getMonth();
let curYear  = new Date().getFullYear();
let editingId   = null;
let selectedColor = 'purple';
let currentView = 'calendar';

/* ── persistence ── */
function loadEvents(){
  try{ const s=localStorage.getItem(STORAGE_KEY); return s?JSON.parse(s):defaults(); }
  catch(e){ return defaults(); }
}
function saveEvents(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(events)); }
function defaults(){
  const y=new Date().getFullYear();
  const m=String(new Date().getMonth()+1).padStart(2,'0');
  return [
    {id:1,title:'reunião de equipe',date:`${y}-${m}-11`,time:'09:00',local:'sala B2',people:'Ana, Pedro',note:'',color:'purple',reminder:30},
    {id:2,title:'consulta médica',date:`${y}-${m}-14`,time:'14:30',local:'clínica central',people:'',note:'trazer exames',color:'teal',reminder:1440},
    {id:3,title:'aniversário',date:`${y}-${m}-20`,time:'19:00',local:'restaurante',people:'família',note:'reserva confirmada',color:'coral',reminder:2880},
  ];
}
let events = loadEvents();
let nextId  = events.length ? Math.max(...events.map(e=>e.id))+1 : 10;

/* ── helpers ── */
function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function daysUntil(ds){ return Math.round((new Date(ds)-new Date(todayStr()))/(864e5)); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── selects ── */
function initSelects(){
  const ms = document.getElementById('monthSelect');
  MONTHS.forEach((m,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=m; ms.appendChild(o); });
  const ys = document.getElementById('yearSelect');
  const cy = new Date().getFullYear();
  for(let y=cy-5; y<=cy+10; y++){ const o=document.createElement('option'); o.value=y; o.textContent=y; ys.appendChild(o); }
}
function updateSelects(){
  document.getElementById('monthSelect').value = curMonth;
  document.getElementById('yearSelect').value  = curYear;
}
function jumpToMonth(){
  curMonth = parseInt(document.getElementById('monthSelect').value);
  curYear  = parseInt(document.getElementById('yearSelect').value);
  renderCalendar();
}
function changeMonth(d){
  curMonth += d;
  if(curMonth>11){ curMonth=0; curYear++; }
  if(curMonth<0) { curMonth=11; curYear--; }
  renderCalendar();
}

/* ── calendar ── */
function renderCalendar(){
  updateSelects();
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  const first    = new Date(curYear, curMonth, 1).getDay();
  const total    = new Date(curYear, curMonth+1, 0).getDate();
  const prevTotal= new Date(curYear, curMonth, 0).getDate();

  for(let i=0; i<first; i++){
    const pm = curMonth===0 ? 11 : curMonth-1;
    const py = curMonth===0 ? curYear-1 : curYear;
    grid.appendChild(makeCell(prevTotal-first+1+i, py, pm, true));
  }
  for(let d=1; d<=total; d++) grid.appendChild(makeCell(d, curYear, curMonth, false));
  const rem = 42-(first+total);
  for(let d=1; d<=rem; d++){
    const nm = curMonth===11 ? 0 : curMonth+1;
    const ny = curMonth===11 ? curYear+1 : curYear;
    grid.appendChild(makeCell(d, ny, nm, true));
  }
  renderUpcoming();
  checkReminders();
}

function makeCell(d, y, m, other){
  const cell    = document.createElement('div');
  const dateStr = `${y}-${pad(m+1)}-${pad(d)}`;
  cell.className = 'day-cell' + (other?' other-month':'') + (dateStr===todayStr()?' today':'');

  const num = document.createElement('div');
  num.className = 'day-num';
  num.textContent = d;
  cell.appendChild(num);

  const dayEvs = events.filter(e=>e.date===dateStr);
  dayEvs.slice(0,2).forEach(ev=>{
    const dot = document.createElement('div');
    dot.className = `event-dot ev-${ev.color||'purple'}`;
    dot.textContent = (ev.time ? ev.time+' ' : '') + ev.title;
    dot.onclick = e => { e.stopPropagation(); openEditEvent(ev.id); };
    cell.appendChild(dot);
  });
  if(dayEvs.length>2){
    const more = document.createElement('div');
    more.className = 'event-dot ev-purple';
    more.textContent = `+${dayEvs.length-2} mais`;
    cell.appendChild(more);
  }
  cell.onclick = () => openNewEvent(dateStr);
  return cell;
}

/* ── upcoming ── */
function renderUpcoming(){
  const ul = document.getElementById('upcomingList');
  ul.innerHTML = '';
  const t = todayStr();
  const future = events.filter(e=>e.date>=t).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).slice(0,8);
  if(!future.length){ ul.innerHTML='<p class="empty">nenhum evento futuro</p>'; return; }
  future.forEach(ev=>{
    const diff  = daysUntil(ev.date);
    const parts = ev.date.split('-');
    const el    = document.createElement('div');
    el.className = 'event-item' + (diff>=0&&diff<=2?' near':'');
    el.innerHTML = `
      <div class="ev-badge">
        <div class="mo">${MONTHS_S[parseInt(parts[1])-1]}</div>
        <div class="nu">${parseInt(parts[2])}</div>
      </div>
      <div class="ev-info">
        <div class="title">${esc(ev.title)}</div>
        <div class="meta">${ev.time||''}${ev.local?' · '+esc(ev.local):''}</div>
      </div>
      ${diff===0?'<span class="bell-badge">hoje</span>':diff===1?'<span class="bell-badge">amanhã</span>':diff===2?'<span class="bell-badge">2 dias</span>':''}
    `;
    el.onclick = () => openEditEvent(ev.id);
    ul.appendChild(el);
  });
}

/* ── list view ── */
function renderListView(){
  const lv = document.getElementById('listView');
  lv.innerHTML = '';
  const t = todayStr();
  const sorted = events.filter(e=>e.date>=t).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  if(!sorted.length){ lv.innerHTML='<p class="empty">nenhum evento futuro</p>'; return; }
  sorted.forEach(ev=>{
    const diff  = daysUntil(ev.date);
    const parts = ev.date.split('-');
    const el    = document.createElement('div');
    el.className = 'lev' + (diff>=0&&diff<=2?' near':'');
    el.innerHTML = `
      <div class="lev-bar" style="background:${COLOR_HEX[ev.color||'purple']}"></div>
      <div class="lev-info" style="flex:1;min-width:0">
        <div class="title">${esc(ev.title)}</div>
        <div class="meta">
          <span class="mi"><i class="ti ti-calendar" style="font-size:13px"></i>${parseInt(parts[2])} de ${MONTHS[parseInt(parts[1])-1]}</span>
          ${ev.time?`<span class="mi"><i class="ti ti-clock" style="font-size:13px"></i>${ev.time}</span>`:''}
          ${ev.local?`<span class="mi"><i class="ti ti-map-pin" style="font-size:13px"></i>${esc(ev.local)}</span>`:''}
          ${ev.people?`<span class="mi"><i class="ti ti-users" style="font-size:13px"></i>${esc(ev.people)}</span>`:''}
        </div>
      </div>
      ${diff===0?'<span class="bell-badge">hoje</span>':diff===1?'<span class="bell-badge">amanhã</span>':diff===2?'<span class="bell-badge">2 dias</span>':''}
    `;
    el.onclick = () => openEditEvent(ev.id);
    lv.appendChild(el);
  });
}

function switchView(v){
  currentView = v;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', i===(v==='calendar'?0:1)));
  const mg = document.getElementById('mainGrid');
  const lv = document.getElementById('listView');
  if(v==='calendar'){ mg.style.display='grid'; lv.classList.remove('show'); }
  else{ mg.style.display='none'; lv.classList.add('show'); renderListView(); }
}

/* ── modal ── */
function openNewEvent(dateStr){
  editingId = null;
  document.getElementById('modalTitle').textContent = 'novo evento';
  document.getElementById('evTitle').value   = '';
  document.getElementById('evDate').value    = dateStr || todayStr();
  document.getElementById('evTime').value    = '';
  document.getElementById('evLocal').value   = '';
  document.getElementById('evPeople').value  = '';
  document.getElementById('evNote').value    = '';
  document.getElementById('evReminder').value= '0';
  document.getElementById('btnDelete').style.display = 'none';
  setColor(document.querySelector('.color-opt[data-color="purple"]'));
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('evTitle').focus(), 100);
}

function openEditEvent(id){
  const ev = events.find(e=>e.id===id);
  if(!ev) return;
  editingId = id;
  document.getElementById('modalTitle').textContent  = 'editar evento';
  document.getElementById('evTitle').value   = ev.title;
  document.getElementById('evDate').value    = ev.date;
  document.getElementById('evTime').value    = ev.time   || '';
  document.getElementById('evLocal').value   = ev.local  || '';
  document.getElementById('evPeople').value  = ev.people || '';
  document.getElementById('evNote').value    = ev.note   || '';
  document.getElementById('evReminder').value= ev.reminder || 0;
  document.getElementById('btnDelete').style.display = 'block';
  const btn = document.querySelector(`.color-opt[data-color="${ev.color||'purple'}"]`);
  if(btn) setColor(btn);
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e){ if(e.target.id==='modalOverlay') closeModal(); }

function saveEvent(){
  const title = document.getElementById('evTitle').value.trim();
  const date  = document.getElementById('evDate').value;
  if(!title || !date) return;
  const ev = {
    id: editingId || nextId++,
    title, date,
    time:     document.getElementById('evTime').value,
    local:    document.getElementById('evLocal').value,
    people:   document.getElementById('evPeople').value,
    note:     document.getElementById('evNote').value,
    color:    selectedColor,
    reminder: parseInt(document.getElementById('evReminder').value) || 0
  };
  if(editingId) events = events.map(e=>e.id===editingId ? ev : e);
  else events.push(ev);
  saveEvents();
  closeModal();
  renderCalendar();
  if(currentView==='list') renderListView();
}

function deleteEvent(){
  if(!editingId) return;
  if(!confirm('Apagar este evento?')) return;
  events = events.filter(e=>e.id!==editingId);
  saveEvents();
  closeModal();
  renderCalendar();
  if(currentView==='list') renderListView();
}

function setColor(btn){
  document.querySelectorAll('.color-opt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedColor = btn.dataset.color;
}

/* ── reminders ── */
function checkReminders(){
  const now = new Date();
  events.forEach(ev=>{
    if(!ev.reminder || !ev.time) return;
    const evDt = new Date(`${ev.date}T${ev.time}`);
    const diff  = Math.round((evDt-now)/60000);
    if(diff>=0 && diff<=ev.reminder){
      const key = `nr_${ev.id}_${ev.date}`;
      if(!sessionStorage.getItem(key)){
        sessionStorage.setItem(key,'1');
        const msg = diff===0 ? `"${ev.title}" começa agora!`
          : diff<60  ? `"${ev.title}" em ${diff} min`
          : diff<1440? `"${ev.title}" em ${Math.round(diff/60)}h`
          : `"${ev.title}" amanhã às ${ev.time}`;
        showNotif('🔔 '+msg);
      }
    }
  });
  const todayEvs = events.filter(e=>e.date===todayStr());
  if(todayEvs.length && !sessionStorage.getItem('today_shown')){
    sessionStorage.setItem('today_shown','1');
    setTimeout(()=>showNotif(`📅 você tem ${todayEvs.length} evento(s) hoje!`), 1500);
  }
}

function showNotif(msg){
  document.getElementById('notifMsg').textContent = msg;
  const b = document.getElementById('notifBanner');
  b.classList.add('show');
  clearTimeout(b._t);
  b._t = setTimeout(()=>b.classList.remove('show'), 7000);
}

/* ── upload / IA ── */
async function handleUpload(ev){
  const files = Array.from(ev.target.files);
  if(!files.length) return;
  document.getElementById('aiLoading').classList.add('show');
  document.getElementById('aiResult').classList.remove('show');
  for(const f of files){
    if(f.type.startsWith('image/')){
      const b64 = await toBase64(f);
      await extractFromImage(b64, f.type);
    } else {
      const txt = await f.text().catch(()=>'');
      if(txt) await extractFromText(txt);
      else showAIResult('para vídeos, crie o evento manualmente!');
    }
  }
  document.getElementById('aiLoading').classList.remove('show');
  ev.target.value = '';
}

function toBase64(file){
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file); });
}

async function extractFromImage(b64, mime){
  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:1000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mime,data:b64}},
          {type:'text',text:`Analise esta imagem e extraia TODOS os eventos, datas, horários, locais e pessoas. Responda APENAS JSON válido sem markdown: {"events":[{"title":"nome","date":"YYYY-MM-DD","time":"HH:MM","local":"","people":"","note":""}]}. Se sem datas: {"events":[],"message":"frase curta"}. Ano padrão: ${new Date().getFullYear()}.`}
        ]}]
      })
    });
    const data = await resp.json();
    processAI(data.content?.find(c=>c.type==='text')?.text || '{}');
  } catch(e){ showAIResult('erro ao processar imagem.'); }
}

async function extractFromText(text){
  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:1000,
        messages:[{role:'user',content:`Extraia eventos com datas deste texto: "${text.slice(0,3000)}"\nResponda APENAS JSON: {"events":[{"title":"nome","date":"YYYY-MM-DD","time":"HH:MM","local":"","people":"","note":""}]}. Ano: ${new Date().getFullYear()}.`}]
      })
    });
    const data = await resp.json();
    processAI(data.content?.find(c=>c.type==='text')?.text || '{}');
  } catch(e){ showAIResult('erro ao processar texto.'); }
}

function processAI(text){
  try{
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    if(parsed.events?.length){
      let added = 0;
      parsed.events.forEach(ev=>{
        if(ev.date && /\d{4}-\d{2}-\d{2}/.test(ev.date)){
          events.push({id:nextId++,title:ev.title||'evento',date:ev.date,time:ev.time||'',local:ev.local||'',people:ev.people||'',note:ev.note||'',color:'purple',reminder:30});
          added++;
        }
      });
      if(added){ saveEvents(); renderCalendar(); if(currentView==='list')renderListView(); showAIResult(`✅ ${added} evento(s) adicionado(s)!`); }
      else showAIResult(parsed.message || 'nenhuma data encontrada.');
    } else showAIResult(parsed.message || 'nenhum evento identificado. crie manualmente!');
  } catch(e){ showAIResult('não encontrei datas claras. crie o evento manualmente!'); }
}

function showAIResult(msg){
  const el = document.getElementById('aiResult');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(()=>el.classList.remove('show'), 9000);
}

/* ── init ── */
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
setInterval(checkReminders, 60000);
initSelects();
renderCalendar();
</script>
